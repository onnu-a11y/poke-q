<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ポケモンクイズ！</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --red:#E3350D;--red-dark:#b02a09;
  --yellow:#FFCB05;--yellow-dark:#c9a000;
  --blue:#3B4CCA;--blue-light:#5a6de8;
  --bg:#1a1f3e;--card:#252b52;--card2:#2e3566;
  --text:#f0f0ff;--text-sub:#9ba3d4;
  --correct:#2ecc71;--correct-bg:#0d3320;
  --wrong:#e74c3c;--wrong-bg:#3d0d0d;
  --radius:18px;--radius-sm:12px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{min-height:100%;}
body{
  font-family:'Zen Maru Gothic',sans-serif;
  background:var(--bg);
  min-height:100vh;
  display:flex;align-items:flex-start;justify-content:center;
  padding:1rem 0.75rem 3rem;
  position:relative;overflow-x:hidden;
}
body::before{
  content:'';position:fixed;top:-120px;right:-120px;
  width:320px;height:320px;border-radius:50%;
  background:conic-gradient(from 0deg,var(--red) 0% 50%,#fff 50% 100%);
  opacity:0.06;pointer-events:none;
  animation:rotateBall 20s linear infinite;
}
body::after{
  content:'';position:fixed;bottom:-80px;left:-80px;
  width:200px;height:200px;border-radius:50%;
  background:conic-gradient(from 0deg,var(--yellow) 0% 50%,#fff 50% 100%);
  opacity:0.05;pointer-events:none;
  animation:rotateBall 14s linear infinite reverse;
}
@keyframes rotateBall{to{transform:rotate(360deg);}}

#app{width:100%;max-width:460px;position:relative;z-index:1;}

.header{text-align:center;margin-bottom:1.25rem;}
.header-title{
  display:inline-block;font-size:26px;font-weight:900;
  color:var(--yellow);
  text-shadow:0 2px 0 var(--yellow-dark),0 4px 12px rgba(255,203,5,0.3);
  letter-spacing:2px;
}
.header-title::before{content:'⚡ ';}
.header-title::after{content:' ⚡';}
.header-sub{font-size:12px;color:var(--text-sub);margin-top:4px;letter-spacing:1px;}

.status-bar{display:flex;align-items:center;gap:10px;margin-bottom:0.75rem;}
.q-badge{
  background:var(--red);color:#fff;font-size:12px;font-weight:700;
  padding:4px 12px;border-radius:20px;white-space:nowrap;
  box-shadow:0 2px 6px rgba(227,53,13,0.4);
}
.score-badge{
  background:var(--yellow);color:#1a1200;font-size:12px;font-weight:700;
  padding:4px 12px;border-radius:20px;white-space:nowrap;
  box-shadow:0 2px 6px rgba(255,203,5,0.4);margin-left:auto;
}
.progress-wrap{flex:1;}
.progress-bar{height:8px;background:rgba(255,255,255,0.1);border-radius:4px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--blue-light),var(--yellow));border-radius:4px;transition:width 0.5s cubic-bezier(.4,0,.2,1);}

.img-card{
  background:var(--card);border-radius:var(--radius);
  padding:1.25rem 1rem 1rem;text-align:center;margin-bottom:0.85rem;
  border:1.5px solid rgba(255,255,255,0.07);overflow:hidden;position:relative;
}
.img-card::before{
  content:'';position:absolute;top:-40px;left:50%;transform:translateX(-50%);
  width:120px;height:120px;border-radius:50%;
  background:radial-gradient(circle,rgba(255,203,5,0.12) 0%,transparent 70%);
}
.poke-img{
  width:160px;height:160px;object-fit:contain;
  filter:drop-shadow(0 4px 16px rgba(255,203,5,0.25));
  animation:floatPoke 3s ease-in-out infinite;position:relative;z-index:1;
}
@keyframes floatPoke{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
.poke-img.shake{animation:shakePoke 0.4s ease forwards;}
@keyframes shakePoke{0%,100%{transform:translateX(0);}20%{transform:translateX(-8px);}40%{transform:translateX(8px);}60%{transform:translateX(-6px);}80%{transform:translateX(6px);}}
.poke-img.bounce{animation:bouncePoke 0.5s ease forwards;}
@keyframes bouncePoke{0%,100%{transform:scale(1);}30%{transform:scale(1.15);}60%{transform:scale(0.95);}}

.hint-box{
  background:rgba(59,76,202,0.2);border:1px solid rgba(90,109,232,0.3);
  border-radius:var(--radius-sm);padding:0.6rem 1rem;margin-bottom:0.85rem;text-align:center;
}
.hint-label{font-size:10px;color:var(--blue-light);font-weight:700;letter-spacing:1.5px;margin-bottom:2px;}
.hint-text{font-size:14px;color:var(--text);line-height:1.5;}

.choices{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:0.85rem;}
.choice-btn{
  background:var(--card2);border:2px solid rgba(255,255,255,0.1);
  border-radius:var(--radius-sm);padding:0.9rem 0.5rem;
  font-size:16px;font-weight:700;font-family:'Zen Maru Gothic',sans-serif;
  cursor:pointer;transition:all 0.15s;color:var(--text);
  min-height:62px;display:flex;align-items:center;justify-content:center;text-align:center;line-height:1.3;
}
.choice-btn:hover:not(:disabled){border-color:var(--yellow);color:var(--yellow);transform:translateY(-2px);box-shadow:0 4px 16px rgba(255,203,5,0.2);}
.choice-btn:active:not(:disabled){transform:scale(0.97);}
.choice-btn.correct{background:var(--correct-bg);border-color:var(--correct);color:var(--correct);animation:correctPop 0.3s ease;}
@keyframes correctPop{0%{transform:scale(0.95);}60%{transform:scale(1.05);}100%{transform:scale(1);}}
.choice-btn.wrong{background:var(--wrong-bg);border-color:var(--wrong);color:var(--wrong);}
.choice-btn:disabled{cursor:default;}

.result-banner{
  text-align:center;padding:0.7rem 1rem;border-radius:var(--radius-sm);
  font-size:16px;font-weight:700;margin-bottom:0.85rem;min-height:46px;line-height:1.4;
}
.result-banner.correct{background:var(--correct-bg);border:1.5px solid var(--correct);color:var(--correct);animation:bannerIn 0.25s ease;}
.result-banner.wrong{background:var(--wrong-bg);border:1.5px solid var(--wrong);color:#ff8a80;animation:bannerIn 0.25s ease;}
@keyframes bannerIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

.next-btn{
  width:100%;padding:1rem;font-size:17px;font-weight:700;font-family:'Zen Maru Gothic',sans-serif;
  border-radius:var(--radius-sm);background:linear-gradient(135deg,var(--red),#ff5722);
  color:#fff;border:none;cursor:pointer;transition:all 0.15s;
  box-shadow:0 4px 16px rgba(227,53,13,0.4);letter-spacing:0.5px;
}
.next-btn:hover{background:linear-gradient(135deg,var(--red-dark),#e64a19);transform:translateY(-2px);box-shadow:0 6px 20px rgba(227,53,13,0.5);}
.next-btn:active{transform:scale(0.98);}

.loading{
  text-align:center;padding:3rem 1.5rem;background:var(--card);
  border-radius:var(--radius);border:1.5px solid rgba(255,255,255,0.07);
}
.pokeball-loader{
  width:60px;height:60px;border-radius:50%;
  background:conic-gradient(from 0deg,var(--red) 0% 50%,#fff 50% 100%);
  margin:0 auto 1rem;position:relative;
  animation:spin 0.9s linear infinite;
  box-shadow:0 0 20px rgba(227,53,13,0.3);
}
.pokeball-loader::after{
  content:'';position:absolute;inset:6px;border-radius:50%;
  background:var(--card);border:3px solid rgba(255,255,255,0.3);
}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-title{font-size:18px;font-weight:700;color:var(--yellow);margin-bottom:0.5rem;}
.loading-text{font-size:14px;color:var(--text-sub);line-height:1.8;}
.loading-bar-wrap{margin:1rem auto 0;max-width:200px;height:6px;background:rgba(255,255,255,0.1);border-radius:3px;overflow:hidden;}
.loading-bar{height:100%;background:linear-gradient(90deg,var(--blue-light),var(--yellow));border-radius:3px;width:0%;transition:width 0.4s ease;}

.score-screen{
  text-align:center;padding:2.5rem 1.5rem;background:var(--card);
  border-radius:var(--radius);border:1.5px solid rgba(255,255,255,0.07);position:relative;overflow:hidden;
}
.score-screen::before{
  content:'';position:absolute;top:0;left:0;right:0;height:4px;
  background:linear-gradient(90deg,var(--red),var(--yellow),var(--blue-light));
}
.score-stars{font-size:40px;margin-bottom:0.75rem;animation:starPop 0.5s ease;}
@keyframes starPop{from{transform:scale(0);opacity:0;}to{transform:scale(1);opacity:1;}}
.score-big{font-size:72px;font-weight:900;color:var(--yellow);line-height:1;text-shadow:0 4px 0 var(--yellow-dark),0 8px 24px rgba(255,203,5,0.3);margin-bottom:0.25rem;}
.score-denom{font-size:28px;color:var(--text-sub);font-weight:500;}
.score-pct{display:inline-block;font-size:14px;font-weight:700;background:rgba(255,203,5,0.15);color:var(--yellow);padding:4px 16px;border-radius:20px;margin:0.5rem 0 0.25rem;border:1px solid rgba(255,203,5,0.3);}
.score-msg{font-size:18px;color:var(--text);margin:0.75rem 0 1.75rem;font-weight:700;}
.restart-btn{
  padding:1rem 2.5rem;font-size:17px;font-weight:700;font-family:'Zen Maru Gothic',sans-serif;
  border-radius:var(--radius-sm);background:linear-gradient(135deg,var(--red),#ff5722);
  color:#fff;border:none;cursor:pointer;box-shadow:0 4px 16px rgba(227,53,13,0.4);transition:all 0.15s;
}
.restart-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(227,53,13,0.5);}

.confetti-wrap{position:fixed;inset:0;pointer-events:none;z-index:100;}
.confetti{position:absolute;width:10px;height:10px;border-radius:2px;animation:fall linear forwards;}
@keyframes fall{0%{transform:translateY(-20px) rotate(0deg);opacity:1;}100%{transform:translateY(100vh) rotate(720deg);opacity:0;}}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-title">ポケモンクイズ</div>
    <div class="header-sub">なんのポケモンか わかるかな？</div>

  <div class="loading" id="loading-screen">

    <div class="loading-bar-wrap"><div class="loading-bar" id="loading-bar"></div></div>
  </div>
  <div id="quiz-area" style="display:none;"></div>
</div>

function getHint(id){return HINTS[id]||"どんなポケモンかな？";}

let allPokemon=[],questions=[],current=0,score=0,answered=false;

async function loadPokemon(){
  try{
    setLoad('ポケモンリストをよみこみ中...',5);
    const r=await fetch('https://pokeapi.co/api/v2/pokemon?limit=1025');
    const d=await r.json();
    const baseList=d.results.map((p,i)=>({id:i+1,name:p.name})).filter(p=>isBase(p.name)&&p.id<=1017);
    setLoad('なまえをよみこみ中...',10);
    await loadNames(baseList);
  }catch(e){showError();}
}
function setLoad(msg,pct){
  const t=document.getElementById('loading-text');
  const b=document.getElementById('loading-bar');
  if(t)t.textContent=msg;
  if(b)b.style.width=pct+'%';
}
function showError(){
  document.getElementById('loading-screen').innerHTML='<div style="font-size:40px;margin-bottom:1rem">😢</div><div class="loading-title">よみこみに失敗したよ</div><div class="loading-text">ページをリロードしてね</div>';
}
async function loadNames(baseList){
  const BATCH=80;
  for(let i=0;i<baseList.length;i+=BATCH){
    const batch=baseList.slice(i,i+BATCH);
    const pct=10+Math.round((i/baseList.length)*88);
    setLoad(`なまえをよみこみ中... ${Math.round((i/baseList.length)*100)}%`,pct);
    await Promise.all(batch.map(async p=>{
      try{
        const r=await fetch(`https://pokeapi.co/api/v2/pokemon-species/${p.id}/`);
        const d=await r.json();
        const jp=d.names.find(n=>n.language.name==='ja-Hrkt')||d.names.find(n=>n.language.name==='ja');
        if(jp)allPokemon.push({id:p.id,name:p.name,jpName:jp.name});
      }catch{}
    }));
  }
  if(allPokemon.length===0){showError();return;}
  setLoad('じゅんびができたよ！🎉',100);
  setTimeout(()=>{
    document.getElementById('loading-screen').style.display='none';
    document.getElementById('quiz-area').style.display='block';
    startQuiz();
  },500);
}

function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function makeChoices(c){return shuffle([c,...shuffle(allPokemon.filter(p=>p.id!==c.id)).slice(0,3)]);}
function startQuiz(){questions=shuffle(allPokemon).slice(0,30);current=0;score=0;answered=false;render();}

function render(){
  const app=document.getElementById('quiz-area');
  if(current>=questions.length){showScore();return;}
  const q=questions[current];
  const choices=makeChoices(q);
  const imgUrl=`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${q.id}.png`;
  app.innerHTML=`
    <div class="status-bar">
      <span class="q-badge">もんだい ${current+1}/${questions.length}</span>
      <div class="progress-wrap"><div class="progress-bar"><div class="progress-fill" style="width:${(current/questions.length)*100}%"></div></div></div>
      <span class="score-badge">⭐ ${score}せいかい</span>
    </div>
    <div class="img-card"><img class="poke-img" id="poke-img" src="${imgUrl}" alt="ポケモン"/></div>
    <div class="hint-box"><div class="hint-label">ヒント</div><div class="hint-text">${getHint(q.id)}</div></div>
    <div class="choices" id="choices-wrap">${choices.map(c=>`<button class="choice-btn" data-chosen="${encodeURIComponent(c.jpName)}" data-correct="${encodeURIComponent(q.jpName)}">${c.jpName}</button>`).join('')}</div>
    <div class="result-banner" id="rb"></div>
    <button class="next-btn" id="nb" style="display:none" onclick="next()">${current+1<questions.length?'つぎのもんだい ▶':'けっかをみる 🎉'}</button>`;
  document.getElementById('choices-wrap').addEventListener('click',function(e){
    const btn=e.target.closest('.choice-btn');
    if(!btn)return;
    pick(btn,decodeURIComponent(btn.dataset.chosen),decodeURIComponent(btn.dataset.correct));
  });
}

function pick(btn,chosen,correct){
  if(answered)return;
  answered=true;
  document.querySelectorAll('.choice-btn').forEach(b=>{b.disabled=true;if(b.textContent===correct)b.classList.add('correct');});
  const rb=document.getElementById('rb');
  const img=document.getElementById('poke-img');
  if(chosen===correct){
    btn.classList.add('correct');
    rb.className='result-banner correct';
    rb.textContent='🎉 せいかい！すごい！';
    score++;
    if(img){img.style.animation='none';void img.offsetWidth;img.style.animation='bouncePoke 0.5s ease forwards';}
  }else{
    btn.classList.add('wrong');
    rb.className='result-banner wrong';
    rb.textContent=`😢 ざんねん… こたえは「${correct}」だよ！`;
    if(img){img.style.animation='none';void img.offsetWidth;img.style.animation='shakePoke 0.4s ease forwards';}
  }
  document.getElementById('nb').style.display='block';
}

function next(){current++;answered=false;render();}

function showScore(){
  const pct=Math.round((score/questions.length)*100);
  let stars='⭐',msg='またチャレンジしてみよう！💪';
  if(pct>=90){stars='🏆🌟🏆';msg='かんぺき！ポケモンマスター！';}
  else if(pct>=70){stars='🎉🎊🎉';msg='すごい！よくできたね！';}
  else if(pct>=50){stars='👏😊👏';msg='がんばったね！もう一回どうぞ！';}
  launchConfetti();
  document.getElementById('quiz-area').innerHTML=`
    <div class="score-screen">
      <div class="score-stars">${stars}</div>
      <div class="score-big">${score}<span class="score-denom">/${questions.length}</span></div>
      <div class="score-pct">${pct}%せいかい</div>
      <div class="score-msg">${msg}</div>
      <button class="restart-btn" onclick="startQuiz()">🎮 もういちど あそぶ</button>
    </div>`;
}

function launchConfetti(){
  const wrap=document.createElement('div');
  wrap.className='confetti-wrap';
  document.body.appendChild(wrap);
  const cols=['#E3350D','#FFCB05','#3B4CCA','#2ecc71','#e74c3c','#fff','#ff69b4'];
  for(let i=0;i<70;i++){
    const c=document.createElement('div');
    c.className='confetti';
    c.style.cssText=`left:${Math.random()*100}%;background:${cols[i%cols.length]};animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*0.8}s;width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>0.5?'50%':'2px'};`;
    wrap.appendChild(c);
  }
  setTimeout(()=>wrap.remove(),4000);
}
loadPokemon();
</script>
