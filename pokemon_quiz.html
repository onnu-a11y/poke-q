<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ポケモンクイズ！</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --red:#E3350D;--red-dark:#b02a09;
  --yellow:#FFCB05;--yellow-dark:#c9a000;
  --blue:#3B4CCA;--blue-light:#5a6de8;
  --bg:#1a1f3e;--card:#252b52;--card2:#2e3566;
  --text:#f0f0ff;--text-sub:#9ba3d4;
  --correct:#2ecc71;--correct-bg:#0d3320;
  --wrong:#e74c3c;--wrong-bg:#3d0d0d;
  --radius:18px;--radius-sm:12px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{min-height:100%;}
body{font-family:'Zen Maru Gothic',sans-serif;background:var(--bg);min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:1rem 0.75rem 3rem;position:relative;overflow-x:hidden;}
body::before{content:'';position:fixed;top:-120px;right:-120px;width:320px;height:320px;border-radius:50%;background:conic-gradient(from 0deg,var(--red) 0% 50%,#fff 50% 100%);opacity:0.06;pointer-events:none;animation:rotateBall 20s linear infinite;}
body::after{content:'';position:fixed;bottom:-80px;left:-80px;width:200px;height:200px;border-radius:50%;background:conic-gradient(from 0deg,var(--yellow) 0% 50%,#fff 50% 100%);opacity:0.05;pointer-events:none;animation:rotateBall 14s linear infinite reverse;}
@keyframes rotateBall{to{transform:rotate(360deg);}}
#app{width:100%;max-width:460px;position:relative;z-index:1;}

.top-header{display:flex;align-items:center;justify-content:center;margin-bottom:1.25rem;position:relative;}
.header-title{font-size:26px;font-weight:900;color:var(–yellow);text-shadow:0 2px 0 var(–yellow-dark),0 4px 12px rgba(255,203,5,0.3);letter-spacing:2px;}
.header-title::before{content:‘⚡ ‘;}
.header-title::after{content:’ ⚡’;}
.gear-btn{position:absolute;right:0;top:50%;transform:translateY(-50%);background:rgba(255,255,255,0.08);border:1.5px solid rgba(255,255,255,0.15);border-radius:50%;width:38px;height:38px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;touch-action:manipulation;-webkit-tap-highlight-color:transparent;transition:background 0.2s;}
.gear-btn:hover{background:rgba(255,255,255,0.15);}

.settings-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:100;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn 0.2s ease;}
.settings-panel{background:var(–card);border-radius:24px 24px 0 0;padding:1.5rem 1.25rem 2.5rem;width:100%;max-width:460px;animation:slideUp 0.25s ease;}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.settings-handle{width:40px;height:4px;background:rgba(255,255,255,0.2);border-radius:2px;margin:0 auto 1.25rem;}
.settings-title{font-size:16px;font-weight:700;color:var(–yellow);margin-bottom:1.25rem;text-align:center;}
.settings-row{margin-bottom:1.25rem;}
.settings-label{font-size:13px;color:var(–text-sub);font-weight:700;letter-spacing:1px;margin-bottom:0.6rem;}
.diff-btns{display:flex;gap:8px;}
.diff-btn{flex:1;padding:0.65rem 0;font-size:14px;font-weight:700;font-family:‘Zen Maru Gothic’,sans-serif;border-radius:var(–radius-sm);border:2px solid rgba(255,255,255,0.15);background:var(–card2);color:var(–text-sub);cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent;transition:all 0.15s;}
.diff-btn.active{border-color:var(–yellow);color:var(–yellow);background:rgba(255,203,5,0.1);}
.settings-close{width:100%;padding:0.85rem;font-size:16px;font-weight:700;font-family:‘Zen Maru Gothic’,sans-serif;border-radius:var(–radius-sm);background:linear-gradient(135deg,var(–red),#ff5722);color:#fff;border:none;cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent;margin-top:0.5rem;}

.top-screen{padding:0.5rem 0;}
.top-sub{font-size:13px;color:var(–text-sub);margin-bottom:1.25rem;letter-spacing:1px;text-align:center;}
.mode-cards{display:flex;flex-direction:column;gap:12px;}
.mode-card{background:var(–card);border:2px solid rgba(255,255,255,0.08);border-radius:var(–radius);padding:1.1rem 1.25rem;cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent;transition:all 0.15s;text-align:left;display:flex;align-items:center;gap:1rem;}
.mode-card:hover{border-color:var(–yellow);transform:translateY(-2px);}
.mode-icon{font-size:40px;flex-shrink:0;}
.mode-name{font-size:18px;font-weight:900;color:var(–yellow);margin-bottom:3px;}
.mode-desc{font-size:12px;color:var(–text-sub);line-height:1.5;}
.mode-trophy{margin-left:auto;flex-shrink:0;font-size:22px;min-width:28px;text-align:center;}

.trophy-section{margin-top:1.25rem;}
.trophy-section-title{font-size:12px;color:var(–text-sub);font-weight:700;letter-spacing:1px;margin-bottom:0.6rem;text-align:center;}
.trophy-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.trophy-cell{background:var(–card);border-radius:var(–radius-sm);padding:0.6rem 0.4rem;text-align:center;border:1px solid rgba(255,255,255,0.06);}
.trophy-cell-mode{font-size:10px;color:var(–text-sub);margin-bottom:2px;}
.trophy-cell-diff{font-size:10px;color:var(–text-sub);margin-bottom:4px;}
.trophy-cell-icon{font-size:20px;}

.status-bar{display:flex;align-items:center;gap:8px;margin-bottom:0.75rem;}
.q-badge{background:var(–red);color:#fff;font-size:12px;font-weight:700;padding:4px 10px;border-radius:20px;white-space:nowrap;box-shadow:0 2px 6px rgba(227,53,13,0.4);}
.mode-badge{font-size:11px;font-weight:700;padding:4px 8px;border-radius:20px;white-space:nowrap;}
.mode-badge.normal{background:rgba(90,109,232,0.3);color:#a0aaff;}
.mode-badge.silhouette{background:rgba(0,0,0,0.4);color:#ccc;}
.mode-badge.math{background:rgba(46,204,113,0.25);color:#7fffc0;}
.mode-badge.retry{background:rgba(255,203,5,0.2);color:var(–yellow);}
.score-badge{background:var(–yellow);color:#1a1200;font-size:12px;font-weight:700;padding:4px 10px;border-radius:20px;white-space:nowrap;box-shadow:0 2px 6px rgba(255,203,5,0.4);margin-left:auto;}
.progress-wrap{flex:1;}
.progress-bar{height:8px;background:rgba(255,255,255,0.1);border-radius:4px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(–blue-light),var(–yellow));border-radius:4px;transition:width 0.5s cubic-bezier(.4,0,.2,1);}

.img-card{background:var(–card);border-radius:var(–radius);padding:1.25rem 1rem 1rem;text-align:center;margin-bottom:0.85rem;border:1.5px solid rgba(255,255,255,0.07);overflow:hidden;position:relative;}
.img-card::before{content:’’;position:absolute;top:-40px;left:50%;transform:translateX(-50%);width:120px;height:120px;border-radius:50%;background:radial-gradient(circle,rgba(255,203,5,0.12) 0%,transparent 70%);}
.poke-img{width:140px;height:140px;object-fit:contain;filter:drop-shadow(0 4px 16px rgba(255,203,5,0.25));animation:floatPoke 3s ease-in-out infinite;position:relative;z-index:1;}
.poke-img.silhouette{filter:brightness(0) drop-shadow(0 4px 16px rgba(0,0,0,0.5));}
@keyframes floatPoke{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
.poke-img.shake{animation:shakePoke 0.4s ease forwards;}
@keyframes shakePoke{0%,100%{transform:translateX(0);}20%{transform:translateX(-8px);}40%{transform:translateX(8px);}60%{transform:translateX(-6px);}80%{transform:translateX(6px);}}
.poke-img.bounce{animation:bouncePoke 0.5s ease forwards;}
@keyframes bouncePoke{0%,100%{transform:scale(1);}30%{transform:scale(1.15);}60%{transform:scale(0.95);}}
.reveal-img{width:140px;height:140px;object-fit:contain;filter:drop-shadow(0 4px 16px rgba(255,203,5,0.25));position:relative;z-index:1;animation:bouncePoke 0.5s ease;}

.math-card{background:var(–card);border-radius:var(–radius);padding:1.5rem 1rem;text-align:center;margin-bottom:0.85rem;border:1.5px solid rgba(46,204,113,0.2);}
.math-row{display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap;}
.math-poke{display:flex;flex-direction:column;align-items:center;gap:2px;}
.math-poke img{width:60px;height:60px;object-fit:contain;filter:drop-shadow(0 2px 6px rgba(255,203,5,0.2));}
.math-poke-count{font-size:18px;font-weight:900;color:var(–yellow);}
.math-op{font-size:28px;font-weight:900;color:var(–text-sub);}
.math-eq{font-size:28px;font-weight:900;color:var(–text-sub);}
.math-q{font-size:38px;font-weight:900;color:var(–yellow);}

.hint-box{background:rgba(59,76,202,0.2);border:1px solid rgba(90,109,232,0.3);border-radius:var(–radius-sm);padding:0.6rem 1rem;margin-bottom:0.85rem;text-align:center;}
.hint-label{font-size:10px;color:var(–blue-light);font-weight:700;letter-spacing:1.5px;margin-bottom:2px;}
.hint-text{font-size:14px;color:var(–text);line-height:1.6;}
.hint-text ruby{ruby-position:over;}
.hint-text rt{font-size:9px;color:var(–text-sub);}

.choices{display:grid;gap:10px;margin-bottom:0.85rem;}
.choices.col2{grid-template-columns:1fr 1fr;}
.choices.col3{grid-template-columns:1fr 1fr 1fr;}
.choice-btn{background:var(–card2);border:2px solid rgba(255,255,255,0.1);border-radius:var(–radius-sm);padding:0.9rem 0.5rem;font-size:16px;font-weight:700;font-family:‘Zen Maru Gothic’,sans-serif;cursor:pointer;transition:all 0.15s;color:var(–text);touch-action:manipulation;-webkit-tap-highlight-color:transparent;min-height:62px;display:flex;align-items:center;justify-content:center;text-align:center;line-height:1.3;}
.choices.col3 .choice-btn{font-size:15px;padding:0.75rem 0.25rem;min-height:56px;}
.choice-btn:hover:not(:disabled){border-color:var(–yellow);color:var(–yellow);transform:translateY(-2px);box-shadow:0 4px 16px rgba(255,203,5,0.2);}
.choice-btn:active:not(:disabled){transform:scale(0.97);}
.choice-btn.correct{background:var(–correct-bg);border-color:var(–correct);color:var(–correct);animation:correctPop 0.3s ease;}
@keyframes correctPop{0%{transform:scale(0.95);}60%{transform:scale(1.05);}100%{transform:scale(1);}}
.choice-btn.wrong{background:var(–wrong-bg);border-color:var(–wrong);color:var(–wrong);}

.result-banner{text-align:center;padding:0.7rem 1rem;border-radius:var(–radius-sm);font-size:16px;font-weight:700;margin-bottom:0.85rem;min-height:46px;line-height:1.4;}
.result-banner.correct{background:var(–correct-bg);border:1.5px solid var(–correct);color:var(–correct);animation:bannerIn 0.25s ease;}
.result-banner.wrong{background:var(–wrong-bg);border:1.5px solid var(–wrong);color:#ff8a80;animation:bannerIn 0.25s ease;}
@keyframes bannerIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

.next-btn{touch-action:manipulation;-webkit-tap-highlight-color:transparent;width:100%;padding:1rem;font-size:17px;font-weight:700;font-family:‘Zen Maru Gothic’,sans-serif;border-radius:var(–radius-sm);background:linear-gradient(135deg,var(–red),#ff5722);color:#fff;border:none;cursor:pointer;transition:all 0.15s;box-shadow:0 4px 16px rgba(227,53,13,0.4);}
.next-btn:hover{background:linear-gradient(135deg,var(–red-dark),#e64a19);transform:translateY(-2px);}
.next-btn:active{transform:scale(0.98);}
.back-btn{touch-action:manipulation;-webkit-tap-highlight-color:transparent;background:transparent;border:1.5px solid rgba(255,255,255,0.2);border-radius:var(–radius-sm);color:var(–text-sub);font-size:13px;font-weight:700;font-family:‘Zen Maru Gothic’,sans-serif;padding:0.5rem 1rem;cursor:pointer;margin-bottom:1rem;display:inline-flex;align-items:center;gap:4px;}

.loading{text-align:center;padding:3rem 1.5rem;background:var(–card);border-radius:var(–radius);border:1.5px solid rgba(255,255,255,0.07);}
.pokeball-loader{width:60px;height:60px;border-radius:50%;background:conic-gradient(from 0deg,var(–red) 0% 50%,#fff 50% 100%);margin:0 auto 1rem;position:relative;animation:spin 0.9s linear infinite;box-shadow:0 0 20px rgba(227,53,13,0.3);}
.pokeball-loader::after{content:’’;position:absolute;inset:6px;border-radius:50%;background:var(–card);border:3px solid rgba(255,255,255,0.3);}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-title{font-size:18px;font-weight:700;color:var(–yellow);margin-bottom:0.5rem;}
.loading-text{font-size:14px;color:var(–text-sub);line-height:1.8;}
.loading-bar-wrap{margin:1rem auto 0;max-width:200px;height:6px;background:rgba(255,255,255,0.1);border-radius:3px;overflow:hidden;}
.loading-bar{height:100%;background:linear-gradient(90deg,var(–blue-light),var(–yellow));border-radius:3px;width:0%;transition:width 0.4s ease;}

.score-screen{text-align:center;padding:2rem 1.5rem;background:var(–card);border-radius:var(–radius);border:1.5px solid rgba(255,255,255,0.07);position:relative;overflow:hidden;}
.score-screen::before{content:’’;position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(–red),var(–yellow),var(–blue-light));}
.score-stars{font-size:40px;margin-bottom:0.5rem;animation:starPop 0.5s ease;}
@keyframes starPop{from{transform:scale(0);opacity:0;}to{transform:scale(1);opacity:1;}}
.score-big{font-size:72px;font-weight:900;color:var(–yellow);line-height:1;text-shadow:0 4px 0 var(–yellow-dark),0 8px 24px rgba(255,203,5,0.3);margin-bottom:0.25rem;}
.score-denom{font-size:28px;color:var(–text-sub);font-weight:500;}
.score-pct{display:inline-block;font-size:14px;font-weight:700;background:rgba(255,203,5,0.15);color:var(–yellow);padding:4px 16px;border-radius:20px;margin:0.5rem 0 0.25rem;border:1px solid rgba(255,203,5,0.3);}
.score-trophy-earned{font-size:36px;margin:0.5rem 0;animation:starPop 0.6s 0.2s both ease;}
.score-msg{font-size:17px;color:var(–text);margin:0.5rem 0 1.25rem;font-weight:700;}
.score-btns{display:flex;flex-direction:column;gap:10px;}
.restart-btn{touch-action:manipulation;-webkit-tap-highlight-color:transparent;padding:1rem;font-size:17px;font-weight:700;font-family:‘Zen Maru Gothic’,sans-serif;border-radius:var(–radius-sm);background:linear-gradient(135deg,var(–red),#ff5722);color:#fff;border:none;cursor:pointer;box-shadow:0 4px 16px rgba(227,53,13,0.4);transition:all 0.15s;}
.restart-btn:hover{transform:translateY(-2px);}
.retry-btn{touch-action:manipulation;-webkit-tap-highlight-color:transparent;padding:0.85rem;font-size:15px;font-weight:700;font-family:‘Zen Maru Gothic’,sans-serif;border-radius:var(–radius-sm);background:rgba(46,204,113,0.15);color:var(–correct);border:1.5px solid rgba(46,204,113,0.4);cursor:pointer;transition:all 0.15s;}
.retry-btn:hover{background:rgba(46,204,113,0.25);}
.top-btn{touch-action:manipulation;-webkit-tap-highlight-color:transparent;padding:0.85rem;font-size:15px;font-weight:700;font-family:‘Zen Maru Gothic’,sans-serif;border-radius:var(–radius-sm);background:transparent;color:var(–text-sub);border:1.5px solid rgba(255,255,255,0.2);cursor:pointer;transition:all 0.15s;}
.top-btn:hover{border-color:var(–yellow);color:var(–yellow);}

.confetti-wrap{position:fixed;inset:0;pointer-events:none;z-index:200;}
.confetti{position:absolute;border-radius:2px;animation:fall linear forwards;}
@keyframes fall{0%{transform:translateY(-20px) rotate(0deg);opacity:1;}100%{transform:translateY(100vh) rotate(720deg);opacity:0;}}
</style>

</head>
<body>
<div id="app">
  <div class="top-header">
    <div class="header-title">ポケモンクイズ</div>
    <button class="gear-btn" id="gear-btn">⚙️</button>
  </div>
  <div id="loading-screen" class="loading">
    <div class="pokeball-loader"></div>
    <div class="loading-title">よみこみ中...</div>
    <div class="loading-text" id="loading-text">ポケモンをあつめているよ！<br>少し待ってね 🎮</div>
    <div class="loading-bar-wrap"><div class="loading-bar" id="loading-bar"></div></div>
  </div>
  <div id="main-area" style="display:none;"></div>
</div>

// ===== 状態管理 =====
let allPokemon=[],easyPokemon=[],hardPokemon=[];

// ===== localStorage =====
const LS_TROPHY=‘poke_trophies’;
const LS_WRONG=‘poke_wrong’;

function loadTrophies(){try{return JSON.parse(localStorage.getItem(LS_TROPHY)||’{}’);}catch{return{};}}
function saveTrophy(mode,diff,medal){
const t=loadTrophies(),key=mode+’*’+diff,order=[‘bronze’,‘silver’,‘gold’];
if(!t[key]||order.indexOf(medal)>order.indexOf(t[key])){t[key]=medal;localStorage.setItem(LS_TROPHY,JSON.stringify(t));}
}
function getTrophy(mode,diff){return loadTrophies()[mode+’*’+diff]||null;}
function trophyIcon(m){return m===‘gold’?‘🥇’:m===‘silver’?‘🥈’:m===‘bronze’?‘🥉’:’’;}
function calcMedal(pct){return pct===100?‘gold’:pct>=80?‘silver’:‘bronze’;}

function loadWrong(){try{return JSON.parse(localStorage.getItem(LS_WRONG)||’[]’);}catch{return[];}}
function saveWrong(list){localStorage.setItem(LS_WRONG,JSON.stringify(list));}

// 間違えた問題を追加（重複なし・最大100件）
function addWrong(q){
const stored=loadWrong();
const key=q.type+’*’+(q.type===‘math’?q.a+’*’+q.op+’*’+q.b:q.id);
if(!stored.find(function(x){return (x.type+’*’+(x.type===‘math’?x.a+’*’+x.op+’*’+x.b:x.id))===key;})){
stored.push(q);
if(stored.length>100)stored.shift();
saveWrong(stored);
}
}

// まちがいなおしで正解したら削除
function removeWrong(q){
const key=q.type+’*’+(q.type===‘math’?q.a+’*’+q.op+’*’+q.b:q.id);
const stored=loadWrong().filter(function(x){
return (x.type+’*’+(x.type===‘math’?x.a+’*’+x.op+’*’+x.b:x.id))!==key;
});
saveWrong(stored);
}

// ===== ローディング =====
function loadPokemon(){
// 名前データは埋め込み済みなのでAPIリクエスト不要
for(const [id, jpName] of Object.entries(POKE_NAMES)){
const numId=parseInt(id);
if(numId<=1017) allPokemon.push({id:numId,jpName:jpName});
}
easyPokemon=allPokemon.filter(function(p){return EASY_IDS.has(p.id);});
hardPokemon=allPokemon.filter(function(p){return !EASY_IDS.has(p.id);});
document.getElementById(‘loading-screen’).style.display=‘none’;
document.getElementById(‘main-area’).style.display=‘block’;
showTop();
}

// ===== ユーティリティ =====
function shuffle(arr){const a=[…arr];for(let i=a.length-1;i>0;i–){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function el(tag,cls){const e=document.createElement(tag);if(cls)e.className=cls;return e;}
function imgUrl(id){return’https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/’+id+’.png’;}

// ===== 問題生成 =====
function makeQuizQuestions(){
const eRatios={easy:25,normal:15,hard:5};
const eCount=eRatios[difficulty];
const easy=shuffle(easyPokemon).slice(0,Math.min(eCount,easyPokemon.length));
const hard=shuffle(hardPokemon).slice(0,Math.min(30-eCount,hardPokemon.length));
return shuffle([…easy,…hard]).map(function(p){return Object.assign({type:‘quiz’},p);});
}
function makeChoices(correct,count){
return shuffle([correct,…shuffle(allPokemon.filter(function(p){return p.id!==correct.id;})).slice(0,count-1)]);
}
function makeMathQ(){
const op=Math.random()<0.5?’+’:’-’;
let a,b;
if(op===’+’){a=Math.floor(Math.random()*8)+1;b=Math.floor(Math.random()*(9-a))+1;}
else{a=Math.floor(Math.random()*8)+2;b=Math.floor(Math.random()*(a-1))+1;}
const ans=op===’+’?a+b:a-b;
const poke1=MATH_POKE[Math.floor(Math.random()*MATH_POKE.length)];
const poke2=op===’-’?poke1:MATH_POKE[Math.floor(Math.random()*MATH_POKE.length)];
const wrongPool=[];
for(let i=1;i<=18;i++){if(Math.abs(i-ans)>=2)wrongPool.push(i);}
const choices=shuffle([ans,…shuffle(wrongPool).slice(0,2)]);
return{type:‘math’,op,a,b,ans,poke1,poke2,choices};
}

// ===== モード開始 =====
function startMode(mode){
currentMode=mode;answered=false;
if(mode===‘retry’){
isRetryMode=true;
const stored=loadWrong();
if(stored.length===0){showTop();return;}
questions=shuffle(stored);current=0;score=0;renderQuestion();return;
}
isRetryMode=false;
if(mode===‘math’){questions=Array.from({length:10},makeMathQ);}
else{questions=makeQuizQuestions();}
current=0;score=0;renderQuestion();
}

// ===== 問題描画 =====
function renderQuestion(){
const area=document.getElementById(‘main-area’);area.innerHTML=’’;
if(current>=questions.length){showScore();return;}
const q=questions[current];

const backBtn=el(‘button’,‘back-btn’);backBtn.textContent=‘← もどる’;
backBtn.addEventListener(‘click’,showTop);area.appendChild(backBtn);

// ステータスバー
const sb=el(‘div’,‘status-bar’);
const qb=el(‘span’,‘q-badge’);qb.textContent=‘もんだい ‘+(current+1)+’/’+questions.length;sb.appendChild(qb);
let badgeCls=‘mode-badge ‘,badgeTxt=’’;
if(isRetryMode){badgeCls+=‘retry’;badgeTxt=‘📝 まちがいなおし’;}
else if(q.type===‘math’){badgeCls+=‘math’;badgeTxt=‘➕ さんすう’;}
else if(currentMode===‘silhouette’){badgeCls+=‘silhouette’;badgeTxt=‘🌑 シルエット’;}
else{badgeCls+=‘normal’;badgeTxt=‘🎮 つうじょう’;}
const mb=el(‘span’,badgeCls);mb.textContent=badgeTxt;sb.appendChild(mb);
const pw=el(‘div’,‘progress-wrap’);const pb=el(‘div’,‘progress-bar’);const pf=el(‘div’,‘progress-fill’);
pf.style.width=(current/questions.length*100)+’%’;pb.appendChild(pf);pw.appendChild(pb);sb.appendChild(pw);
const scoreBadge=el(‘span’,‘score-badge’);scoreBadge.textContent=’⭐ ’+score+‘せいかい’;sb.appendChild(scoreBadge);
area.appendChild(sb);

if(q.type===‘math’){
renderMathQuestion(area,q);
}else{
renderQuizQuestion(area,q);
}
}

function renderQuizQuestion(area,q){
const isSilhouette=(currentMode===‘silhouette’&&!isRetryMode)||(isRetryMode&&q.mode===‘silhouette’);
const imgCard=el(‘div’,‘img-card’);
const img=document.createElement(‘img’);
img.id=‘poke-img’;img.src=imgUrl(q.id);img.alt=‘ポケモン’;

const hintBox=el(‘div’,‘hint-box’);
const hintLabel=el(‘div’,‘hint-label’);hintLabel.textContent=‘ヒント’;hintBox.appendChild(hintLabel);
const hintText=el(‘div’,‘hint-text’);hintText.innerHTML=getHint(q.id);hintBox.appendChild(hintText);
area.appendChild(hintBox);

const choiceCount=isSilhouette?3:4;
const choices=makeChoices(q,choiceCount);
const cw=el(‘div’,’choices ’+(choiceCount===3?‘col3’:‘col2’));
choices.forEach(function(c){
const btn=el(‘button’,‘choice-btn’);btn.textContent=c.jpName;
(function(chosen,correct){
btn.addEventListener(‘click’,function(){pickQuiz(btn,chosen,correct,isSilhouette,q);});
})(c.jpName,q.jpName);
cw.appendChild(btn);
});
area.appendChild(cw);
appendResultAndNext(area);
}

function renderMathQuestion(area,q){
const mc=el(‘div’,‘math-card’);
const row=el(‘div’,‘math-row’);

function makePokeCol(pokeData,count){
const col=el(‘div’,‘math-poke’);
const img=document.createElement(‘img’);
img.src=imgUrl(pokeData.id);img.alt=pokeData.name;
col.appendChild(img);
const cnt=el(‘div’,‘math-poke-count’);cnt.textContent=count+‘ひき’;col.appendChild(cnt);
return col;
}

if(q.op===’+’){
row.appendChild(makePokeCol(q.poke1,q.a));
const op=el(‘div’,‘math-op’);op.textContent=’+’;row.appendChild(op);
row.appendChild(makePokeCol(q.poke2,q.b));
}else{
row.appendChild(makePokeCol(q.poke1,q.a));
const op=el(‘div’,‘math-op’);op.textContent=‘−’;row.appendChild(op);
const col2=el(‘div’,‘math-poke’);
const img2=document.createElement(‘img’);img2.src=imgUrl(q.poke1.id);img2.alt=q.poke1.name;
col2.appendChild(img2);
const cnt2=el(‘div’,‘math-poke-count’);cnt2.textContent=q.b+‘ひき’;col2.appendChild(cnt2);
row.appendChild(col2);
}
const eq=el(‘div’,‘math-eq’);eq.textContent=‘＝’;row.appendChild(eq);
const qmark=el(‘div’,‘math-q’);qmark.textContent=’？’;row.appendChild(qmark);
mc.appendChild(row);area.appendChild(mc);

const cw=el(‘div’,‘choices col3’);
q.choices.forEach(function(c){
const btn=el(‘button’,‘choice-btn’);btn.textContent=c+‘ひき’;
(function(chosen){
btn.addEventListener(‘click’,function(){pickMath(btn,chosen,q);});
})(c);
cw.appendChild(btn);
});
area.appendChild(cw);
appendResultAndNext(area);
}

function appendResultAndNext(area){
const rb=el(‘div’,‘result-banner’);rb.id=‘rb’;area.appendChild(rb);
const nb=el(‘button’,‘next-btn’);nb.id=‘nb’;
nb.textContent=current+1<questions.length?‘つぎのもんだい ▶’:‘けっかをみる 🎉’;
nb.style.display=‘none’;
nb.addEventListener(‘click’,nextQuestion);
area.appendChild(nb);
}

// ===== 回答処理（クイズ）=====
function pickQuiz(btn,chosen,correct,isSilhouette,q){
if(answered)return;answered=true;
document.querySelectorAll(’.choice-btn’).forEach(function(b){
b.style.pointerEvents=‘none’;if(b.textContent===correct)b.classList.add(‘correct’);
});
const rb=document.getElementById(‘rb’);
const img=document.getElementById(‘poke-img’);
if(chosen===correct){
btn.classList.add(‘correct’);
rb.className=‘result-banner correct’;rb.textContent=‘🎉 せいかい！すごい！’;score++;
if(img){if(isSilhouette)img.className=‘reveal-img’;else{img.style.animation=‘none’;void img.offsetWidth;img.style.animation=‘bouncePoke 0.5s ease forwards’;}}
if(isRetryMode)removeWrong(q); // ✅ 正解したら削除
}else{
btn.classList.add(‘wrong’);
rb.className=‘result-banner wrong’;rb.textContent=‘😢 ざんねん… こたえは「’+correct+’」だよ！’;
if(img){if(isSilhouette)img.className=‘reveal-img’;else{img.style.animation=‘none’;void img.offsetWidth;img.style.animation=‘shakePoke 0.4s ease forwards’;}}
if(!isRetryMode)addWrong(Object.assign({},q,{mode:currentMode})); // 間違えたら保存
}
document.getElementById(‘nb’).style.display=‘block’;
}

// ===== 回答処理（算数）=====
function pickMath(btn,chosen,q){
if(answered)return;answered=true;
document.querySelectorAll(’.choice-btn’).forEach(function(b){
b.style.pointerEvents=‘none’;
if(parseInt(b.textContent)===q.ans)b.classList.add(‘correct’);
});
const rb=document.getElementById(‘rb’);
if(chosen===q.ans){
btn.classList.add(‘correct’);
rb.className=‘result-banner correct’;rb.textContent=‘🎉 せいかい！すごい！’;score++;
if(isRetryMode)removeWrong(q);
}else{
btn.classList.add(‘wrong’);
rb.className=‘result-banner wrong’;
rb.textContent=‘😢 ざんねん… こたえは「’+q.ans+‘ひき」だよ！’;
if(!isRetryMode)addWrong(q);
}
document.getElementById(‘nb’).style.display=‘block’;
}

function nextQuestion(){current++;answered=false;renderQuestion();}

// ===== スコア画面 =====
function showScore(){
const pct=Math.round((score/questions.length)*100);
const medal=calcMedal(pct);
const diffKey=currentMode===‘math’?‘all’:difficulty;
if(!isRetryMode)saveTrophy(currentMode,diffKey,medal);

let stars=‘⭐’,msg=‘またチャレンジしてみよう！💪’;
if(pct===100){stars=‘🏆🌟🏆’;msg=‘かんぺき！ポケモンマスター！’;}
else if(pct>=80){stars=‘🎉🎊🎉’;msg=‘すごい！よくできたね！’;}
else if(pct>=50){stars=‘👏😊👏’;msg=‘がんばったね！もう一かいどうぞ！’;}

if(pct>0)launchConfetti();
const area=document.getElementById(‘main-area’);area.innerHTML=’’;
const sc=el(‘div’,‘score-screen’);
const ss=el(‘div’,‘score-stars’);ss.textContent=stars;sc.appendChild(ss);
const sbig=el(‘div’,‘score-big’);sbig.textContent=score;
const sd=el(‘span’,‘score-denom’);sd.textContent=’/’+questions.length;sbig.appendChild(sd);sc.appendChild(sbig);
const sp=el(‘div’,‘score-pct’);sp.textContent=pct+’%せいかい’;sc.appendChild(sp);

if(!isRetryMode){
const te=el(‘div’,‘score-trophy-earned’);te.textContent=trophyIcon(medal)+’  ゲット！’;sc.appendChild(te);
}

const sm=el(‘div’,‘score-msg’);sm.textContent=msg;sc.appendChild(sm);
const btns=el(‘div’,‘score-btns’);

const rb=el(‘button’,‘restart-btn’);rb.textContent=‘🔄 もういちどあそぶ’;
rb.addEventListener(‘click’,function(){startMode(currentMode);});btns.appendChild(rb);

const wrongCount=loadWrong().length;
if(wrongCount>0&&!isRetryMode){
const retryBtn=el(‘button’,‘retry-btn’);retryBtn.textContent=‘📝 まちがいなおし（’+wrongCount+‘もん）’;
retryBtn.addEventListener(‘click’,function(){startMode(‘retry’);});btns.appendChild(retryBtn);
}

const tb=el(‘button’,‘top-btn’);tb.textContent=‘🏠 モードをえらびなおす’;
tb.addEventListener(‘click’,showTop);btns.appendChild(tb);
sc.appendChild(btns);area.appendChild(sc);
}

// ===== 設定パネル =====
document.getElementById(‘gear-btn’).addEventListener(‘click’,openSettings);
function openSettings(){
const overlay=el(‘div’,‘settings-overlay’);
overlay.addEventListener(‘click’,function(e){if(e.target===overlay)overlay.remove();});
const panel=el(‘div’,‘settings-panel’);
const handle=el(‘div’,‘settings-handle’);panel.appendChild(handle);
const title=el(‘div’,‘settings-title’);title.textContent=‘⚙️ せってい’;panel.appendChild(title);
const row=el(‘div’,‘settings-row’);
const label=el(‘div’,‘settings-label’);label.textContent=‘むずかしさ（クイズ・シルエット）’;row.appendChild(label);
const diffBtns=el(‘div’,‘diff-btns’);
[[‘easy’,‘かんたん’],[‘normal’,‘ふつう’],[‘hard’,‘むずかしい’]].forEach(function(d){
const btn=el(‘button’,‘diff-btn’+(difficulty===d[0]?’ active’:’’));btn.textContent=d[1];
btn.addEventListener(‘click’,function(){
difficulty=d[0];
diffBtns.querySelectorAll(’.diff-btn’).forEach(function(b){b.className=‘diff-btn’;});
btn.className=‘diff-btn active’;
});
diffBtns.appendChild(btn);
});
row.appendChild(diffBtns);panel.appendChild(row);
const closeBtn=el(‘button’,‘settings-close’);closeBtn.textContent=‘とじる ✕’;
closeBtn.addEventListener(‘click’,function(){overlay.remove();});
panel.appendChild(closeBtn);overlay.appendChild(panel);document.body.appendChild(overlay);
}

// ===== 紙吹雪 =====
function launchConfetti(){
const wrap=document.createElement(‘div’);wrap.className=‘confetti-wrap’;document.body.appendChild(wrap);
const cols=[’#E3350D’,’#FFCB05’,’#3B4CCA’,’#2ecc71’,’#e74c3c’,’#fff’,’#ff69b4’];
for(let i=0;i<70;i++){
const c=document.createElement(‘div’);c.className=‘confetti’;
c.style.cssText=‘left:’+Math.random()*100+’%;background:’+cols[i%cols.length]+’;animation-duration:’+(1.5+Math.random()*2)+‘s;animation-delay:’+Math.random()*0.8+‘s;width:’+(6+Math.random()*8)+‘px;height:’+(6+Math.random()*8)+‘px;border-radius:’+(Math.random()>0.5?‘50%’:‘2px’)+’;’;
wrap.appendChild(c);
}
setTimeout(function(){wrap.remove();},4000);
}

loadPokemon();
</script>
